# .github/workflows/deploy-android.yml
name: Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            zip \
            libz-dev \
            libncurses-dev \
            libtinfo-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            ccache \
            git \
            wget

      - name: Set up Python 3.11 (required for Android build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Android build tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33 jinja2

      - name: Install project dependencies (excluding numpy)
        run: |
          grep -v "^numpy==" requirements.txt > requirements_android.txt
          pip install -r requirements_android.txt

      - name: Install compatible numpy version
        run: |
          pip install numpy==2.4.6

      - name: Install Android deployment requirements
        run: |
          pip install pkginfo tqdm packaging==24.1

      - name: Copy main.py to root (Android requires it at application directory)
        run: |
          cp src/main.py ./main.py

      - name: Fix pysidedeploy.spec for Android
        run: |
          sed -i 's/^project_dir = .*/project_dir = .\//' pysidedeploy.spec
          sed -i 's/^input_file = .*/input_file = main.py/' pysidedeploy.spec
          sed -i 's/numpy==2.5.1/numpy==2.4.6/g' pysidedeploy.spec

      - name: Download PySide6 Android wheels
        run: |
          mkdir -p wheels
          pip download --only-binary=:all: --platform android_21_arm64_v8a --python-version 3.11 --dest wheels PySide6==6.11.1 shiboken6==6.11.1
          PYSIDE_WHEEL=$(ls wheels/PySide6-*.whl | head -1)
          SHIBOKEN_WHEEL=$(ls wheels/shiboken6-*.whl | head -1)
          echo "PYSIDE_WHEEL=$PWD/$PYSIDE_WHEEL" >> $GITHUB_ENV
          echo "SHIBOKEN_WHEEL=$PWD/$SHIBOKEN_WHEEL" >> $GITHUB_ENV

      - name: Install Android SDK & NDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: android-sdk
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/pysidedeploy.spec') }}
          restore-keys: android-sdk-

      - name: Run pyside6-android-deploy
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          GANZABARA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GANZABARA_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.ANDROID_KEYALIAS_PASSWORD }}
        run: |
          pyside6-android-deploy -c pysidedeploy.spec --force \
            --wheel-pyside "$PYSIDE_WHEEL" \
            --wheel-shiboken "$SHIBOKEN_WHEEL"

      - name: Debug - List files
        run: |
          echo "=== Contents of ./src ==="
          ls -la ./src/ || echo "src directory not found"
          echo "=== Contents of ./src/bin ==="
          ls -la ./src/bin/ 2>/dev/null || echo "bin directory not found"
          echo "=== Contents of ./src/.buildozer ==="
          ls -la ./src/.buildozer/ 2>/dev/null || echo ".buildozer directory not found"
          echo "=== Contents of ./ ==="
          ls -la ./ || echo "root directory not found"
          echo "=== Searching for APK/AAB ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ganzabara-android
          path: |
            ./*.apk
            ./*.aab
            ./src/*.apk
            ./src/*.aab
            ./src/bin/*.apk
            ./src/bin/*.aab
            ./src/.buildozer/*.apk
            ./src/.buildozer/*.aab
          retention-days: 30
        continue-on-error: true