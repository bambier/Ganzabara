# .github/workflows/deploy-android.yml
name: Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: Setup Android SDK
        uses: android-actions/setup-android@v4


      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          ant \
          autoconf \
          automake \
          autopoint \
          ccache \
          cmake \
          g++ \
          gcc \
          git \
          lbzip2 \
          libffi-dev \
          libltdl-dev \
          libtool \
          libssl-dev \
          make \
          openjdk-17-jdk \
          patch \
          pkg-config \
          python3 \
          python3-dev \
          python3-pip \
          python3-venv \
          sudo \
          unzip \
          wget \
          zip \
          tree

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Android build tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython jinja2 wheel pkginfo tqdm packaging==24.1

      - name: Install project dependencies
        run: |
          pip install --upgrade -r noversion.requirements.txt


      - name: Run pyside6-android-deploy
        env:
          GANZABARA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GANZABARA_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.ANDROID_KEYALIAS_PASSWORD }}
        run: |
          cd ./src
          pyside6-android-deploy -c ../pysidedeploy.spec --force

      - name: Debug - List files
        run: |
          echo "=== Contents of ./src ==="
          ls -la ./src/ || echo "src directory not found"
          echo "=== Contents of ./src/bin ==="
          ls -la ./src/bin/ 2>/dev/null || echo "bin directory not found"
          echo "=== Contents of ./src/.buildozer ==="
          ls -la ./src/.buildozer/ 2>/dev/null || echo ".buildozer directory not found"
          echo "=== Contents of ./ ==="
          ls -la ./ || echo "root directory not found"
          echo "=== Searching for APK/AAB ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"
          echo "=== tree ==="
          tree -I venv -I STRUCTURE -I images -I data


      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ganzabara-android
          path: |
            ./*.apk
            ./*.aab
            ./src/*.apk
            ./src/*.aab
            ./src/bin/*.apk
            ./src/bin/*.aab
            ./src/.buildozer/*.apk
            ./src/.buildozer/*.aab
          retention-days: 30
        continue-on-error: true