# .github/workflows/deploy-android.yml
name: Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            zip \
            libz-dev \
            libncurses-dev \
            libtinfo-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            ccache \
            git \
            wget

      - name: Set up Python 3.11 (required for Android build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Android build tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython jinja2

      - name: Install project dependencies
        run: |
          pip install -r noversion.requirements.txt

      - name: Install Android deployment requirements
        run: |
          pip install pkginfo tqdm packaging

      - name: Download Android NDK and SDK (using Qt's official script)
        run: |
          git clone --depth 1 https://code.qt.io/pyside/pyside-setup
          python pyside-setup/tools/cross_compile_android/main.py --download-only --skip-update --auto-accept-license

      - name: Copy main.py to root and fix spec file
        run: |
          cp src/main.py ./main.py
          sed -i 's/^project_dir = .*/project_dir = .\//' pysidedeploy.spec
          sed -i 's/^input_file = .*/input_file = main.py/' pysidedeploy.spec
          # Remove version pins from numpy and pandas in spec file
          sed -i 's/numpy==[0-9.]*/numpy/g' pysidedeploy.spec
          sed -i 's/pandas==[0-9.]*/pandas/g' pysidedeploy.spec

      - name: Run pyside6-android-deploy
        env:
          GANZABARA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GANZABARA_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.ANDROID_KEYALIAS_PASSWORD }}
        run: |
          pyside6-android-deploy -c pysidedeploy.spec --force

      - name: Debug - List files
        run: |
          echo "=== Contents of ./src ==="
          ls -la ./src/ || echo "src directory not found"
          echo "=== Contents of ./src/bin ==="
          ls -la ./src/bin/ 2>/dev/null || echo "bin directory not found"
          echo "=== Contents of ./src/.buildozer ==="
          ls -la ./src/.buildozer/ 2>/dev/null || echo ".buildozer directory not found"
          echo "=== Contents of ./ ==="
          ls -la ./ || echo "root directory not found"
          echo "=== Searching for APK/AAB ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ganzabara-android
          path: |
            ./*.apk
            ./*.aab
            ./src/*.apk
            ./src/*.aab
            ./src/bin/*.apk
            ./src/bin/*.aab
            ./src/.buildozer/*.apk
            ./src/.buildozer/*.aab
          retention-days: 30
        continue-on-error: true