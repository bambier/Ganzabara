name: Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            unzip \
            zip \
            libz-dev \
            libncurses-dev \
            libtinfo-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            ccache \
            git \
            wget

      - name: Set up Python 3.11 (required for Android build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Android build tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33 jinja2

      - name: Install project dependencies (excluding numpy)
        run: |
          # Remove numpy line from requirements to avoid version conflict
          grep -v "^numpy==" requirements.txt > requirements_android.txt
          pip install -r requirements_android.txt

      - name: Install compatible numpy version
        run: |
          # numpy 2.5.1 requires Python 3.12+; use 2.4.6 for Python 3.11
          pip install numpy==2.4.6

      - name: Install Android deployment requirements
        run: |
          pip install pkginfo tqdm packaging==24.1

      - name: Install Android SDK & NDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export ANDROID_HOME=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Run pyside6-android-deploy
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
          GANZABARA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GANZABARA_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.ANDROID_KEYALIAS_PASSWORD }}
        run: |
          pyside6-android-deploy -c pysidedeploy.spec --force

      - name: Debug - List all files in src directory
        run: |
          echo "=== Contents of ./src ==="
          ls -la ./src/ || echo "src directory not found"
          echo "=== Contents of ./src/bin ==="
          ls -la ./src/bin/ 2>/dev/null || echo "bin directory not found"
          echo "=== Contents of ./src/.buildozer ==="
          ls -la ./src/.buildozer/ 2>/dev/null || echo ".buildozer directory not found"
          echo "=== Searching for APK/AAB files ==="
          find ./src -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ganzabara-android
          path: |
            ./src/*.apk
            ./src/*.aab
            ./src/bin/*.apk
            ./src/bin/*.aab
            ./src/.buildozer/*.apk
            ./src/.buildozer/*.aab
          retention-days: 30
        continue-on-error: true