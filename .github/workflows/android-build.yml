# .github/workflows/deploy-android.yml

name: Deploy Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ant \
            autoconf \
            automake \
            autopoint \
            ccache \
            cmake \
            g++ \
            gcc \
            git \
            lbzip2 \
            libffi-dev \
            libltdl-dev \
            libtool \
            libssl-dev \
            make \
            patch \
            pkg-config \
            python3-dev \
            python3-venv \
            unzip \
            wget \
            zip \
            tree

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install build dependencies
        run: |
          pip install \
            buildozer \
            cython \
            jinja2 \
            wheel \
            pkginfo \
            tqdm \
            packaging==24.1 \
            GitPython \
            qtpip

      - name: Install project dependencies
        run: |
          pip install -r noversion.requirements.txt

      - name: Download Qt for Android
        run: |
          git clone https://code.qt.io/pyside/pyside-setup
          cd pyside-setup

          python tools/cross_compile_android/main.py \
            --download-only \
            --skip-update \
            --auto-accept-license

          cd ..

          qtpip download PySide6 \
            --android \
            --arch aarch64

      - name: Debug environment
        run: |
          echo "========== Python =========="
          python --version
          which python

          echo "========== importlib =========="
          python - <<'PY'
          import sys
          import importlib

          print(sys.version)
          print(importlib)
          print(getattr(importlib, "__file__", None))
          print(hasattr(importlib, "util"))

          import importlib.util
          print(importlib.util)
          PY

          echo "========== Shadowing =========="
          find . -name "importlib.py"
          find . -type d -name "importlib"

          echo "========== Wheels =========="
          find $HOME -name "*.whl"
          find . -name "*.whl"

          echo "========== Android Wheels =========="
          find $HOME -name "PySide6*-android*.whl"
          find $HOME -name "shiboken6*-android*.whl"

      - name: Run pyside6-android-deploy
        env:
          GANZABARA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          GANZABARA_ANDROID_KEYALIAS_PASSWORD: ${{ secrets.ANDROID_KEYALIAS_PASSWORD }}
        run: |
          cd src

          pyside6-android-deploy \
            -c ../pysidedeploy.spec \
            --force \
            --verbose

      - name: Debug output
        if: always()
        run: |
          find . -name "*.apk"
          find . -name "*.aab"
          tree -L 4

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ganzabara-android
          retention-days: 30
          path: |
            **/*.apk
            **/*.aab